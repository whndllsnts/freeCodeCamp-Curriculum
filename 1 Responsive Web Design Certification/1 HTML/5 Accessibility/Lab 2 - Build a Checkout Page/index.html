<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Checkout Page</title>
</head>

<body>
    <h1>Checkout</h1>
    <section>
        <h2>Your Cart</h2>
        <img src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="A scrambled Rubik's Cube with the top layer partially rotated.">
    </section>
    <section>
        <h2>Payment Information</h2>
        <form action="">
            <label for="card-name">Card Name:<span aria-hidden="true">*</span></label>
            <input type="text" name="card-name" id="card-name" required>
            <label for="card-number">Card Number:<span aria-hidden="true">*</span></label>
            <input type="text" name="card-number" id="card-number" aria-describedby="card-number-help" required>
            <p id="card-number-help">Format: 1234-5678-9012-3456</p>
        </form>
    </section>
</body>

</html>
