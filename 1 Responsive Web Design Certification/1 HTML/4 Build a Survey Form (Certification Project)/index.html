<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1 id="title">freeCodeCamp Survey Form</h1>
  <p id="description">Thank you for taking the time to help us improve the platform</p>
  
  <form id="survey-form">
    <!-- name -->
    <label for="name" id="name-label">Name</label>
    <input type="text" name="name" id="name" placeholder="Enter your name" required>
    <br>
    <!-- email -->
    <label for="email" id="email-label">Email</label>
    <input type="email" name="email" id="email" placeholder="Enter your email" required>
    <br>
    <!-- age -->
    <label for="number" id="number-label">Age (optional)</label>
    <input type="number" name="age" id="number" min="10" max="100" placeholder="Age">
    <br>
    <br>
    <!-- select -->
    <label for="dropdown">Which option best describes your current role?</label>
    <br>
    <br>
    <select name="dropdown" id="dropdown">
      <option value="role" selected disabled>Select current role</option>
      <option value="student">Student</option>
      <option value="full-time-job">Full Time Job</option>
      <option value="full-time-learner">Full Time Learner</option>
      <option value="prefer-not-to-say">Prefer not to say</option>
      <option value="other">Other</option>
    </select>
    <br>
    <!-- radio -->
    <p>Would you recommend freeCodeCamp to a friend?</p>
    <input type="radio" name="choice" id="definitely" value="definitely">
    <label for="definitely">Definitely</label>
    <input type="radio" name="choice" id="maybe" value="maybe">
    <label for="maybe">Maybe</label>
    <input type="radio" name="choice" id="not-sure" value="not-sure">
    <label for="not-sure">Not sure</label>
    <br>
    <!-- select -->
    <label for="feature">What is your favorite feature of freeCodeCamp?</label>
    <select id="feature">
      <option value="option" selected disabled>Select an option</option>
      <option value="challenges">Challenges</option>
      <option value="projects">Project</option>
      <option value="community">Community</option>
      <option value="open-source">Open Source</option>
    </select>
    <!-- checkbox -->
    <p>What would you like to see improved? (Check all that apply)</p>
    <input type="checkbox" name="improved" id="front-end-projects" value="front-end-projects">
    <label for="front-end-projects">Front-end Projects</label>
    <input type="checkbox" name="improved" id="back-end-projects" value="back-end-projects">
    <label for="back-end-projects">Back-end Projects</label>
    <input type="checkbox" name="improved" id="data-visualization" value="data-visualization">
    <label for="data-visualization">Data Visualization</label>
    <br>
    <input type="checkbox" name="improved" id="challenges" value="challenges">
    <label for="challenges">Challenges</label>
    <input type="checkbox" name="improved" id="open-source-community" value="open-source-community">
    <label for="open-source-community">Oper Source Community</label>
    <input type="checkbox" name="improved" id="gitter-help-rooms" value="gitter-help-rooms">
    <label for="gitter-help-rooms">Gitter help rooms</label>
    <br>
    <input type="checkbox" name="improved" id="videos" value="videos">
    <label for="videos">Videos</label>
    <input type="checkbox" name="improved" id="city-meetups" value="city-meetups">
    <label for="city-meetups">City Meetups</label>
    <input type="checkbox" name="improved" id="wiki" value="wiki">
    <label for="wiki">Wiki</label>
    <input type="checkbox" name="improved" id="forum" value="forum">
    <label for="forum">Forum</label>
    <input type="checkbox" name="improved" id="additional-resources" value="additional-resources">
    <label for="additional-resources">Additional Courses</label>
    <br>
    <br>
    <!-- textarea -->
    <label for="comments">Any comments or suggestions?</label>
    <br>
    <br>
    <textarea name="comments" id="comments" placeholder="Enter your comment here..."></textarea>
    <br>
    <br>
    <!-- button -->
    <button type="submit" name="submit" id="submit">Submit</button>
  </form>
</body>
</html>
