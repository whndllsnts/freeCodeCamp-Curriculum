<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <h1>Registration Form</h1>
    <p>Please fill out this form with the required information</p>

    <form action="https://register-demo.freecodecamp.org" method="POST">
      <fieldset>
        <label for="first-name">Enter Your First Name: 
          <input type="text" id="first-name" required>
        </label>
        <label for="last-name">Enter Your Last Name: 
          <input type="text" id="last-name" required>
        </label>
        <label for="email">Enter Your Email: 
          <input type="email" id="email" required>
        </label>
        <label for="new-password">Create a New Password: 
          <input type="password" id="new-password" required pattern="[a-z0-5]{8,}">
        </label>
      </fieldset>

      <fieldset>
        <legend>Account type (required)</legend>
        <label for="personal-account">
          <input type="radio" name="account-type" id="personal-account" value="personal" checked> Personal
        </label> 
        <label for="business-account">
          <input type="radio" name="account-type" id="business-account" value="business"> Business
        </label>
      </fieldset>

      <fieldset>
        <label>Upload a profile picture: 
          <input type="file">
        </label>
        <label>Input your age (years): 
          <input type="number" min="13" max="120">
        </label>
        <label>How did you hear about us?
          <select>
            <option>(select one)</option>
            <option>freeCodeCamp News</option>
            <option>freeCodeCamp YouTube Channel</option>
            <option>freeCodeCamp Forum</option>
            <option>Other</option>
          </select>
        </label>
      </fieldset>

      <a href="https://www.freecodecamp.org/news/terms-of-service/
">Read our terms and conditions</a>
      <label for="terms-and-conditions"><input type="checkbox" id="terms-and-conditions" required> I accept the terms and conditions</label>
      <input type="submit" value="Submit">
    </form>

  </body>
</html>
