<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Styled To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>My To-Do List</h1>
    <ul class="todo-list">
      <li>
        <input type="checkbox" name="gaming" id="gaming">
        <label for="gaming">Explore gaming keyboards</label>
        <ul class="sub-item">
          <li>
            <a href="#" class="sub-item-link" target="_blank">Store link</a>
          </li>
        </ul>
      </li>
      <li>
        <input type="checkbox" name="report" id="report">
        <label for="report">Finish the report</label>
        <ul class="sub-item">
          <li>
            <a href="#" class="sub-item-link" target="_blank">Request Access</a>
          </li>
        </ul>
      </li>
      <li>
        <input type="checkbox" name="warranty" id="warranty">
        <label for="warranty">View Phone's Warranty</label>
        <ul class="sub-item">
          <li>
            <a href="#" class="sub-item-link" target="_blank">View Receipts</a>
          </li>
        </ul>
      </li>
      <li>
        <input type="checkbox" name="processor-specs" id="processor-specs">
        <label for="processor-specs">Check Processor Specs</label>
        <ul class="sub-item">
          <li>
            <a href="#" class="sub-item-link" target="_blank">View Model Number</a>
          </li>
        </ul>
      </li>
    </ul>
  </div>
  
</body>

</html>
